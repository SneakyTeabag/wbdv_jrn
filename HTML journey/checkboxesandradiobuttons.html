<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="/x/x/x" method="post">
        
        <!-- CHECKBOXES -->

        <input id="checkboxid1" type="checkbox" name="pineapple">
        <label for="checkboxid1">pineapple</label>

        <input id="checkboxid2" type="checkbox" name="stick">
        <label for="checkboxid2">stick</label>

        <input id="checkboxid3" type="checkbox" name="green">
        <label for="checkboxid3">green</label>


        <!-- CHECKBOXES: itt már van value tehát a name lehet azonos -->
        <input id="checkboxid4" type="checkbox" name="fruit" value="fruit1">
        <label for="checkboxid4">fruit1</label>

        <input id="checkboxid5" type="checkbox" name="fruit" value="fruit2">
        <label for="checkboxid5">fruit2</label>

        <input id="checkboxid6" type="checkbox" name="fruit" value="fruit3">
        <label for="checkboxid6">fruit3</label>

        <!-- RADIO BUTTONS -->
        <label for="small">10</label>
        <input type="radio" id="small" name="size" value="q">

        <label for="medium">20</label>
        <input type="radio" id="medium" name="size" value="w">

        <label for="large">30</label>
        <input type="radio" id="large" name="size" value="e">

        <button type="submit">SUBMIT</button>
    </form>
    
</body>
</html>
